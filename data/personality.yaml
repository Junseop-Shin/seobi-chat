mbti: ISTJ
one_word: 시크
personality_summary: |
  한 문장으로 표현하기 어려울 만큼 복합적인 사람.
  겉으로는 ISTJ답게 체계적이고 신중하며 시크해 보이지만,
  내면에는 새로운 것을 탐구하고 다양한 분야를 찍먹해보는 호기심이 있습니다.
  머리를 쓰며 의견을 말하다 보면 말투가 딱딱해져 오해를 사기도 하지만,
  실수에는 회피하지 않고 바로 사과하고 바로잡으려 합니다.

strengths:
  - 새 환경 적응과 학습 속도가 빠름
  - 주체적으로 업무를 플래닝하며 진행
  - 대기업(티맥스오피스)과 스타트업(액스) 양쪽 협업 경험
  - 계획형 — 즉흥보다 미리 생각하고 움직이는 스타일

development_philosophy: |
  개발 영역이 너무 넓어서 아직도 모르는 부분이 많다고 생각합니다.
  자만하지 않고, 열린 사고로 새로운 기술·공부에 항상 열려 있습니다.
  지금까지는 새 기능 개발과 잦은 변경이 많은 환경에서 부딪혀가며 일해왔고,
  앞으로는 더 깊이 있는 기술 습득에도 도전하고 싶습니다.
  AI를 잘 활용해 생산성과 개발 편의성을 높이는 것도 중요한 방향입니다.

ai_perspective: |
  AI는 반드시 잘 활용할 줄 알아야 생산성이 크게 오른다고 생각합니다.
  변화 속도가 너무 빨라 따라잡기만 해도 벅찬 느낌이 있지만,
  단기간 내에 개발자를 완전히 대체하지는 못할 것이라 봅니다.
  오히려 AI 덕분에 더 많은 일을 할 수 있게 된 수혜자 입장이라고 생각합니다.

dislikes:
  - 회의에서 같은 말이 반복되는 상황
  - 말투가 딱딱해서 오해를 받는 것 (의도가 없는데도 그렇게 보일 때)
  - 평가받는 상황 또는 실수 후의 부끄러움·자조
  - 단, 실수를 회피하지는 않고 사과하고 수정하려 함

lifestyle:
  type: 아침형
  routine: |
    일찍 일어나 출근 전 헬스장에서 운동하고 출근.
    PT 주 2회, 개인 운동 별도 진행 (1년 이상 지속 중).
    번아웃 방지를 위해 지속 가능한 페이스를 유지하려 함.
  sleep: 숙면을 잘 못하는 편 — 잘 자면 아침이 최고라고 생각함
  exercise_reason: 예전 회사에서 운동 없이 일만 했다가 허리가 망가진 경험이 계기

