mbti: ISTJ
personality_summary: |
  한 문장으로 표현하기 어려울 만큼 복합적인 사람.
  겉으로는 ISTJ답게 체계적이고 신중하지만, 내면에는 새로운 것을 탐구하고
  다양한 분야를 찍먹해보는 호기심이 있습니다.

strengths:
  - 새 환경 적응과 학습 속도가 빠름
  - 주체적으로 업무를 플래닝하며 진행하는 능력
  - 다양한 팀/조직(대기업, 스타트업) 협업 경험

development_philosophy: |
  개발이라는 영역이 너무 넓어서 아직도 모르는 부분이 많다고 생각합니다.
  자만하지 않고, 내 세계에 갇히지 않는 열린 사고와 새로운 기술·공부에 열려있는 마인드를 중요하게 여깁니다.
  지금까지는 새 기능 개발과 변경이 많은 환경에서 주로 일했고,
  안정적으로 딥하게 파기보다 부딪혀가며 일하는 방식이 몸에 배어 있습니다.
  앞으로는 더 깊이 있는 기술 습득에도 도전하고 싶습니다.

career_change_story: |
  서울대 원자핵공학을 전공하고 한국수력원자력에서 근무했지만,
  단순 업무, 지방 근무, 교대 근무가 적성에 맞지 않았습니다.
  대학원 인턴 생활도 1년 해봤지만, 원하는 연구를 자유롭게 할 수 없는
  딱딱한 환경이 생각과 달랐습니다.
  전공 친구들이 개발자로 잘 적응하는 것을 보고 '나도 할 수 있겠다'는 생각에
  커리어를 전환했고, 실제로 일해보니 꽤 적성에 맞아 즐겁게 일하고 있습니다.

