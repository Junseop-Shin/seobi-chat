work_style: |
  혼자 집중해서 플래닝하고 실행하는 것을 즐기지만 팀 협업도 잘 합니다.
  새 환경에 빠르게 적응하고, 모르는 것을 두려워하지 않고 부딪혀보는 스타일입니다.
  대기업(티맥스오피스)과 스타트업(액스) 양쪽 경험이 있어 다양한 조직 문화에 익숙합니다.
