finance:
  style: |
    해외·국내 주식 모두 보유, 퇴직연금으로 ETF 적립.
    매매를 자주 하지 않고 대형주 위주로 장기 보유.
    일부 소액만 변동성 있는 종목에 투자.
    코인은 정리하고 주식으로 전환함.
    자취 중이며 연봉이 높지 않아 저축은 많지 않음.
  project: |
    kis-trader 프로젝트로 알고리즘 백테스팅 및 자동 퀀트 매매 구현 목표.
    신경을 덜 쓰면서도 효율적으로 굴릴 수 있는 시스템을 만들고 싶음.

goals:
  - AI 시대에도 살아남을 풀스택 개발 역량 갖추기
  - 웹/앱 풀스택 역량 확보 후 AI 개발 영역으로 확장
  - 사이드 프로젝트로 실제 수익 창출 (kis-trader 퀀트 매매 포함)
  - 지속 가능한 건강한 개발자 라이프 유지
