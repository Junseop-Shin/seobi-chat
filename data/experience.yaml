jobs:
  - company: 한국수력원자력 (KHNP)
    role: 현장 실습 / 인턴
    period: "2016.08 ~ 2020.01"
    tech: []
    description: |
      원자력 발전소 시스템 및 기계 설비 유지보수 업무를 수행했습니다.
      비개발 직군으로 근무하다가 개발에 대한 열정으로 이직을 결심했습니다.

  - company: 티맥스오피스 (Tmax Office)
    role: C++ 개발자
    period: "2020.02 ~ 2022.02"
    tech: ["C++", "Windows"]
    description: |
      Windows 기반 문서 편집기(hwp, Word, Excel, PowerPoint) 개발.
      한글 문서 편집기(ToHangul/ToOffice) 담당.
      머리글/바닥글, 섹션, 다단 등 복잡한 레이아웃 기능 구현.
      공유 문서 편집기 아키텍처 개선 작업 수행.

  - company: 티맥스오피스 (Tmax Office)
    role: 프론트엔드 개발자
    period: "2022.02 ~ 2023.09"
    tech: ["JavaScript", "TypeScript", "React", "Webpack", "Jest"]
    description: |
      웹 오피스 공통 프레임워크 개발 (docx, pptx, xlsx, hwp 포맷 지원).
      클립보드 프레임워크, 선택(Selection) 프레임워크 구축.
      CI/CD 관리, Webpack v4→v5 마이그레이션, Jest 최적화 (v26→v29).
      React v16→v18 마이그레이션 담당.

  - company: 액스 (Ax)
    role: 프론트엔드 개발자
    period: "2023.09 ~ 2023.12"
    tech: ["React", "TypeScript"]
    description: |
      여행 B2B 서비스 스타트업.
      계정 관리, 상품 미리보기 페이지 등 신규 기능 구현.
      CI/CD 개선 및 공통 구조 작업.
      3개월 내 배정된 이슈 180개 중 140개(78%) 해결.
      디자인 시스템 컴포넌트 구현: Color, Label, Icon, InputField, TextArea, Dropdown, Dialog, Modal.

  - company: 티앤엠테크 (T&M Tech)
    role: 풀스택 개발자
    period: "2024.01 ~ 현재"
    tech: ["React", "TypeScript", "Spring Boot", "PostgreSQL", "GitHub Actions"]
    description: |
      AI CCTV 및 하콘/센서 임베디드 통신 관련 플랫폼 서비스의 백엔드/프론트엔드 담당.
      주 업무: 배치 처리, 외부 API 연동 (기상청, 카카오톡 알림톡, DR/해피콜 등 외부 업체 협업).
      약 17,000개 게이트웨이의 5분 주기 데이터 수집·제어 서비스를 레거시에서 신규 플랫폼으로 이관.
      MySQL → PostgreSQL 마이그레이션 포함, 사실상 레거시 전면 재구현 수준의 작업.
      파일 직접 교체 방식의 배포를 GitHub Actions 기반 자동 무중단 배포로 전환.
    notable_incident: |
      구 파일교체 배포 방식으로 작업 중 SSL 인증서를 잘못 덮어써 1시간 서비스 장애 발생.
      이 경험으로 CI/CD와 배포 전 백업의 중요성을 뼈저리게 체감.
      이후 동일한 실수는 절대 반복하지 않겠다는 다짐을 갖게 됨.

education:
  - school: 서울대학교
    major: 원자핵공학과
    period: "2010.03 ~ 2016.08"
    gpa: "3.2/4.3"
    note: |
      졸업 후 대학원 연구실에서 1년간 인턴 생활을 했습니다.
      연구/탐구가 적성에 맞다고 생각했지만, 원하는 연구를 마음대로 할 수 없는
      딱딱한 대학원 환경이 맞지 않아 취업을 선택했습니다.
      발전소에서 단순 업무/지방 근무/교대 근무가 적성에 맞지 않았고,
      전공 친구들이 개발로 전향해 잘 적응하는 것을 보고 커리어 전환을 결심했습니다.
