name: Deploy to Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_INGESTOR_URL: ${{ secrets.NEXT_PUBLIC_INGESTOR_URL }}

      - name: Generate ecosystem.config.js with env vars
        run: |
          cat > ecosystem.config.js << 'ECOSYSTEM_EOF'
          module.exports = {
            apps: [{
              name: 'seobi-chat',
              script: 'server.js',
              exec_mode: 'fork',
              cwd: '.',
              instances: 1,
              autorestart: true,
              watch: false,
              max_memory_restart: '500M',
              env: {
                NODE_ENV: 'production',
                PORT: 3002,
                GEMINI_API_KEY: 'GEMINI_KEY_PLACEHOLDER',
                NEXT_PUBLIC_BASE_URL: 'BASE_URL_PLACEHOLDER'
              }
            }]
          };
          ECOSYSTEM_EOF
          sed -i "s|GEMINI_KEY_PLACEHOLDER|${{ secrets.GEMINI_API_KEY }}|g" ecosystem.config.js
          sed -i "s|BASE_URL_PLACEHOLDER|${{ secrets.NEXT_PUBLIC_BASE_URL }}|g" ecosystem.config.js

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Sync build output
        run: |
          SSH="ssh -i ~/.ssh/id_deploy -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          $SSH "pm2 stop seobi-chat" || true
          # 디렉토리 없으면 생성 (2>nul: 이미 있어도 오류 무시)
          $SSH "mkdir \"${{ secrets.SEOBI_DEPLOY_PATH }}\" 2>nul & mkdir \"${{ secrets.SEOBI_DEPLOY_PATH }}\\.next\" 2>nul & mkdir \"${{ secrets.SEOBI_DEPLOY_PATH }}\\.next\\static\" 2>nul & mkdir \"${{ secrets.SEOBI_DEPLOY_PATH }}\\public\" 2>nul & mkdir \"${{ secrets.SEOBI_DEPLOY_PATH }}\\data\" 2>nul & echo dirs ready"
          tar czf - -C .next/standalone . | $SSH "tar xzf - -C ${{ secrets.SEOBI_DEPLOY_PATH }}"
          tar czf - -C .next/static . | $SSH "tar xzf - -C ${{ secrets.SEOBI_DEPLOY_PATH }}/.next/static"
          tar czf - -C data . | $SSH "tar xzf - -C ${{ secrets.SEOBI_DEPLOY_PATH }}/data"
          tar czf - ecosystem.config.js | $SSH "tar xzf - -C ${{ secrets.SEOBI_DEPLOY_PATH }}"

      - name: Reload pm2
        run: |
          ssh -i ~/.ssh/id_deploy \
            -p ${{ secrets.DEPLOY_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=20 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.SEOBI_DEPLOY_PATH }} && pm2 stop seobi-chat 1>nul 2>&1 & pm2 delete seobi-chat 1>nul 2>&1 & pm2 start ecosystem.config.js && pm2 save && echo pm2 ok"
